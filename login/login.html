<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vendor Management System login portal. Securely access the administrator or officer dashboard.">
    <title>Vendor Management System - Portal Login</title>
    <!-- CSS stylesheet Link -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Main Container -->
    <main class="vms-container">

        <!-- Glassmorphic Login Card -->
        <section class="glass-panel login-panel">
            <div class="split-container">
                
                <!-- Left Pane: Branding & Avatar Upload -->
                <div class="pane-left">
                    <header class="vms-header">
                        <h1><span>Vendor</span> Portal</h1>
                        <p class="header-desc">Secure Authentication Gateway</p>
                    </header>
                    
                    <!-- Avatar Photo Upload Circle -->
                    <div class="photo-upload-container">
                        <div class="photo-circle" id="photoCircle" title="Click to upload profile photo">
                            <svg id="photoPlaceholderIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <span id="photoPlaceholderText">Photo</span>
                            <img id="photoPreview" class="photo-preview" src="" alt="Photo Preview">
                        </div>
                        <!-- Hidden file picker -->
                        <input type="file" id="photoInput" class="photo-input" accept="image/*">
                    </div>
                </div>

                <!-- Right Pane: Login Form -->
                <div class="pane-right">
                    <h2 class="form-title">Login Account</h2>
                    <p class="form-subtitle">Enter your credential tokens to authenticate</p>

                    <form id="vmsLoginForm" novalidate>
                        <!-- Username Input -->
                        <div class="form-group">
                            <label class="form-label" for="vmsUsername">Username</label>
                            <div class="input-container">
                                <input type="text" id="vmsUsername" class="form-control" placeholder="e.g. rahul_sharma" required autocomplete="username">
                                <div class="input-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                        <circle cx="12" cy="7" r="4"/>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <!-- Password Input -->
                        <div class="form-group">
                            <label class="form-label" for="vmsPassword">Password</label>
                            <div class="input-container">
                                <input type="password" id="vmsPassword" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                                <div class="input-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Action -->
                        <button type="submit" class="btn btn-primary" id="loginBtn">
                            Login Button
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"/>
                                <polyline points="12 5 19 12 12 19"/>
                            </svg>
                        </button>
                    </form>

                    <!-- Card Footer Switcher Link -->
                    <footer class="form-footer">
                        New vendor organization? 
                        <a href="register.html" class="form-link">Register Account</a>
                    </footer>
                </div>

            </div>
        </section>

    </main>

    <!-- Toast Notification Container -->
    <div class="toast-container" aria-live="polite"></div>

    <!-- JS Logic link -->
    <script src="script.js"></script>
</body>
</html>
