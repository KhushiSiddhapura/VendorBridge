<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="VendorBridge registration portal. Create vendor and procurement officer accounts.">

    <title>VendorBridge - Register</title>

    <link rel="stylesheet" href="register.css">
</head>

<body>

    <main class="vms-container">

        <section class="glass-panel register-panel">

            <div class="split-container">

                <!-- Left Side -->
                <div class="pane-left">

                    <header class="vms-header">
                        <h1><span>Vendor</span>Bridge</h1>
                        <p class="header-desc">
                            Registration & Onboarding Portal
                        </p>
                    </header>

                    <div class="photo-upload-container">

                        <div class="photo-circle" id="photoCircle"
                            title="Click to upload profile photo">

                            <svg id="photoPlaceholderIcon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round">

                                <path
                                    d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />

                                <circle cx="12" cy="13" r="4" />

                            </svg>

                            <span id="photoPlaceholderText">
                                Photo
                            </span>

                            <img
                                id="photoPreview"
                                class="photo-preview"
                                src=""
                                alt="Photo Preview">

                        </div>

                        <input
                            type="file"
                            id="photoInput"
                            class="photo-input"
                            accept="image/*">

                    </div>

                </div>

                <!-- Right Side -->
                <div class="pane-right">

                    <h2 class="form-title">
                        Create Account
                    </h2>

                    <p class="form-subtitle">
                        Register a new VendorBridge user account
                    </p>

                    <form
                        id="vmsRegisterForm"
                        method="POST"
                        action="../auth/register.php">

                        <div class="form-grid">

                            <!-- First Name -->
                            <div class="form-group">

                                <label
                                    class="form-label"
                                    for="vmsFirstName">
                                    First Name
                                </label>

                                <div class="input-container">

                                    <input
                                        type="text"
                                        id="vmsFirstName"
                                        name="firstname"
                                        class="form-control"
                                        placeholder="e.g. Aarav"
                                        required
                                        autocomplete="given-name">

                                    <div class="input-icon">

                                        <svg viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            stroke-linecap="round"
                                            stroke-linejoin="round">

                                            <path
                                                d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />

                                            <circle cx="12" cy="7" r="4" />

                                        </svg>

                                    </div>

                                </div>

                            </div>

                            <!-- Last Name -->
                            <div class="form-group">

                                <label
                                    class="form-label"
                                    for="vmsLastName">
                                    Last Name
                                </label>

                                <div class="input-container">

                                    <input
                                        type="text"
                                        id="vmsLastName"
                                        name="lastname"
                                        class="form-control"
                                        placeholder="e.g. Sharma"
                                        required
                                        autocomplete="family-name">

                                    <div class="input-icon">

                                        <svg viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            stroke-linecap="round"
                                            stroke-linejoin="round">

                                            <path
                                                d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />

                                            <circle cx="12" cy="7" r="4" />

                                        </svg>

                                    </div>

                                </div>

                            </div>

                            <!-- Email -->
                            <div class="form-group">

                                <label
                                    class="form-label"
                                    for="vmsEmail">
                                    Email Address
                                </label>

                                <div class="input-container">

                                    <input
                                        type="email"
                                        id="vmsEmail"
                                        name="email"
                                        class="form-control"
                                        placeholder="example@company.com"
                                        required
                                        autocomplete="email">

                                    <div class="input-icon">

                                        <svg viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            stroke-linecap="round"
                                            stroke-linejoin="round">

                                            <path
                                                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />

                                            <polyline points="22,6 12,13 2,6" />

                                        </svg>

                                    </div>

                                </div>

                            </div>

                            <!-- Phone -->
                            <div class="form-group">

                                <label
                                    class="form-label"
                                    for="vmsPhone">
                                    Phone Number
                                </label>

                                <div class="input-container">

                                    <input
                                        type="tel"
                                        id="vmsPhone"
                                        name="phone"
                                        class="form-control"
                                        placeholder="+91 9876543210"
                                        required
                                        autocomplete="tel">

                                    <div class="input-icon">

                                        <svg viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            stroke-linecap="round"
                                            stroke-linejoin="round">

                                            <path
                                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />

                                        </svg>

                                    </div>

                                </div>

                            </div>

                            <!-- Role -->
                            <div class="form-group">

                                <label
                                    class="form-label"
                                    for="vmsRole">
                                    Role
                                </label>

                                <div class="select-wrapper">

                                    <select
                                        id="vmsRole"
                                        name="role"
                                        class="form-control"
                                        required>


                                        <option value="vendor" selected>
                                            Vendor
                                        </option>

                                        <option value="admin">
                                            Admin
                                        </option>

                                        <option value="manager">
                                            Manager
                                        </option>

                                        <option value="procurement_officer">
                                            Procurement Officer
                                        </option>

                                    </select>

                                </div>

                            </div>

                            <!-- Country -->
                            <div class="form-group">

                                <label
                                    class="form-label"
                                    for="vmsCountry">
                                    Country
                                </label>

                                <div class="input-container">

                                    <input
                                        type="text"
                                        id="vmsCountry"
                                        name="country"
                                        class="form-control"
                                        placeholder="India"
                                        required>

                                </div>

                            </div>

                            <!-- Description -->
                            <div class="form-group grid-span-2">

                                <label
                                    class="form-label"
                                    for="vmsInfo">
                                    Additional Information
                                </label>

                                <textarea
                                    id="vmsInfo"
                                    name="description"
                                    class="form-control"
                                    rows="3"
                                    placeholder="GSTIN, PAN, Services Offered, Business Details..."></textarea>

                            </div>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary"
                            id="registerBtn">

                            Create Account

                        </button>

                    </form>

                </div>

            </div>

        </section>

    </main>

    <div class="toast-container" aria-live="polite"></div>

    <script src="script.js"></script>

</body>

</html>
