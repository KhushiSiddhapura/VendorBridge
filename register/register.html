<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - CoupleTodo</title>
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h1>💖 CoupleTodo</h1>
        <p>Create your account and start sharing tasks with your partner.</p>
      </div>

      <div class="right">

        <form class="form-card" method="POST" action="../auth/register.php">
        
            <h2>Create Account</h2>

          <div class="input-group">
            <label>username</label>
            <input type="text" placeholder="Enter your name" name="username" />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input
              type="password"
              placeholder="Create password"
              name="password"
            />
          </div>

          <div class="input-group">
            <label>Confirm Password</label>
            <input
              type="password"
              placeholder="Confirm password"
              name="confirm_password"
            />
          </div>

          <button type="submit">Create Couple Account</button>

          <p class="bottom-text">
            Already have an account?
            <a href="../login/login.html">Login</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
